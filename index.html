  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        if (!entry.compressed && entry.mime.indexOf('image/') === 0) {
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' + entry.data;
          return;
        }
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ot_Knowledge (57 seeded facts) and Bot_Lessons so kitchen staff self-serve and behavior adapts without redeployment.</p></div>\n            <div><span style=\"font-family: 'JetBrains Mono', monospace; font-size: 10.5px; letter-spacing: 1px; color: #4ade80;\">OUTCOME</span><p style=\"margin: 4px 0 0; font-size: 14.5px; line-height: 1.55; color: #e3e3ee;\">One-click menu expansion auto-creates ~17 recipe subitems (~94% less intake time), verified by 25/25 BOM and 50/50 stock-event unit tests plus live deductions on real 300- and 700-pax weddings — end-to-end latency under 15 seconds.</p></div>\n          </div>\n        </div>\n        <div style=\"display: flex; flex-wrap: wrap; gap: 8px; margin-top: 22px; padding-top: 22px; border-top: 1px solid rgba(255,255,255,0.08);\">\n          <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #c4c4d4; background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.22); padding: 6px 12px; border-radius: 999px;\">12 production workflows</span>\n          <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #c4c4d4; background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.22); padding: 6px 12px; border-radius: 999px;\">4-layer architecture</span>\n          <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #c4c4d4; background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.22); padding: 6px 12px; border-radius: 999px;\">47 recipes audited</span>\n          <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #c4c4d4; background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.22); padding: 6px 12px; border-radius: 999px;\">303 ingredient rows</span>\n          <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 11px; color: #c4c4d4; background: rgba(167,139,250,0.08); border: 1px solid rgba(167,139,250,0.22); padding: 6px 12px; border-radius: 999px;\"> , var(--accent2, #818cf8)); color: #0a0a0f; font-weight: 700; font-size: 13px;\">AS</span>\n      <span style=\"font-size: 13.5px; color: #9a9ab0;\">Andi Sharil Azwan — AI Automation Engineer</span>\n    </div>\n    <span style=\"font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: #6b6b80;\">© 2026 · Built &amp; automated with intent</span>\n  </footer>\n\n</div>\n\n\n\u003C/x-dc\u003E\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1240, &quot;height&quot;: 900}, &quot;accentColor&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#a78bfa&quot;, &quot;tsType&quot;: &quot;string&quot;}, &quot;accent2Color&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#818cf8&quot;, &quot;tsType&quot;: &quot;string&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    return {\n      accentVar: this.props.accentColor ?? '#a78bfa',\n      accent2Var: this.props.accent2Color ?? '#818cf8',\n    };\n  }\n\n  componentDidMount() {\n    // ---- Scroll reveal ----\n    const reveals = Array.from(document.querySelectorAll('[data-reveal]'));\n    reveals.forEach((el, i) => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(26px)';\n      el.style.transition = 'opacity .7s cubic-bezier(.2,.7,.2,1), transform .7s cubic-bezier(.2,.7,.2,1)';\n      el.style.willChange = 'opacity, transform';\n    });\n    const revealEl = (el) => {\n      if (el.dataset.revealed) return;\n      el.dataset.revealed = '1';\n      el.style.opacity = '1';\n      el.style.transform = 'translateY(0)';\n    };\n    let io = null;\n    try {\n      io = new IntersectionObserver((entries) => {\n        entries.forEach((e) => {\n          if (e.isIntersecting) {\n            const el = e.target;\n            const sibs = Array.from(el.parentElement ? el.parentElement.querySelectorAll(':scope > [data-reveal]') : [el]);\n            const idx = Math.max(0, sibs.indexOf(el));\n            el.style.transitionDelay = (idx * 70) + 'ms';\n            revealEl(el);\n            io.unobserve(el);\n          }\n        });\n      }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n      reveals.forEach((el) => io.observe(el));\n    } catch (err) { io = null; }\n\n    // Fallback: reveal anything already in view + on scroll, in case IO never fires\n    const revealInView = () => {\n      const h = window.innerHeight || document.documentElement.clientHeight;\n      reveals.forEach((el) => {\n        const r = el.getBoundingClientRect();\n        if (r.top < h * 0.92 && r.bottom > 0) revealEl(el);\n      });\n    };\n    revealInView();\n    window.addEventListener('scroll', revealInView, { passive: true });\n    window.addEventListener('resize', revealInView, { passive: true });\n    this._revealScan = revealInView;\n    // Hard safety net: never leave content hidden\n    this._revealSafety = setTimeout(() => reveals.forEach(revealEl), 1200);\n\n    // ---- Animated counters ----\n    const counters = Array.from(document.querySelectorAll('[data-count]'));\n    const animateCount = (el) => {\n      const target = parseFloat(el.getAttribute('data-count')) || 0;\n      const prefix = el.getAttribute('data-prefix') || '';\n      const suffix = el.getAttribute('data-suffix') || '';\n      const dur = 1400;\n      const start = performance.now();\n      const step = (now) => {\n        const t = Math.min(1, (now - start) / dur);\n        const eased = 1 - Math.pow(1 - t, 3);\n        const val = Math.round(target * eased);\n        el.textContent = prefix + val + suffix;\n        if (t < 1) requestAnimationFrame(step);\n        else el.textContent = prefix + target + suffix;\n      };\n      requestAnimationFrame(step);\n    };\n    let cio = null;\n    try {\n      cio = new IntersectionObserver((entries) => {\n        entries.forEach((e) => {\n          if (e.isIntersecting && !e.target.dataset.counted) { e.target.dataset.counted = '1'; animateCount(e.target); cio.unobserve(e.target); }\n        });\n      }, { threshold: 0.6 });\n      counters.forEach((el) => cio.observe(el));\n    } catch (err) { cio = null; }\n    const countInView = () => {\n      const h = window.innerHeight || document.documentElement.clientHeight;\n      counters.forEach((el) => {\n        if (el.dataset.counted) return;\n        const r = el.getBoundingClientRect();\n        if (r.top < h * 0.85 && r.bottom > 0) { el.dataset.counted = '1'; animateCount(el); }\n      });\n    };\n    countInView();\n    window.addEventListener('scroll', countInView, { passive: true });\n    this._countScan = countInView;\n    this._countSafety = setTimeout(() => counters.forEach((el) => { if (!el.dataset.counted) { el.dataset.counted = '1'; animateCount(el); } }), 1400);\n\n    // ---- Typed line ----\n    const typed = document.getElementById('typed');\n    if (typed) {\n      const phrases = [\n        'n8n workflows that run businesses',\n        'Claude API conversational bots',\n        'Monday.com CRM integrations',\n        'GraphQL + webhook pipelines',\n        'multilingual AI assistants',\n      ];\n      let pi = 0, ci = 0, deleting = false;\n      const tick = () => {\n        const word = phrases[pi];\n        if (!deleting) {\n          ci++;\n          typed.textContent = word.slice(0, ci);\n          if (ci >= word.length) { deleting = true; return setTimeout(tick, 1700); }\n          return setTimeout(tick, 52);\n        } else {\n          ci--;\n          typed.textContent = word.slice(0, ci);\n          if (ci <= 0) { deleting = false; pi = (pi + 1) % phrases.length; return setTimeout(tick, 260); }\n          return setTimeout(tick, 26);\n        }\n      };\n      this._typeTimer = setTimeout(tick, 700);\n    }\n\n    // ---- Live Systems (Monday.com, synced daily) ----\n    (() => {\n      const grid = document.getElementById(\"live-grid\");\n      const updEl = document.getElementById(\"live-updated\");\n      const cntEl = document.getElementById(\"live-counts\");\n      if (!grid) return;\n      const esc = (x) => String(x == null ? \"\" : x).replace(/[&<>\"]/g, (c) => ({ \"&\": \"&amp;\", \"<\": \"&lt;\", \">\": \"&gt;\", '\"': \"&quot;\" }[c]));\n      const card = (it) => {\n        const live = it.state === \"live\" || /live/i.test(it.status || \"\");\n        const color = live ? \"#4ade80\" : \"#fbbf24\";\n        const label = live ? \"LIVE\" : \"TESTING\";\n        const meta = [it.platform, it.type].filter(Boolean).join(\" · \");\n        return '<div style=\"border-radius:14px;border:1px solid rgba(255,255,255,0.08);background:rgba(20,20,28,0.5);padding:16px 18px;display:flex;flex-direction:column;gap:9px;\">'\n          + '<div style=\"display:flex;align-items:center;gap:8px;\">'\n          + '<span style=\"width:8px;height:8px;border-radius:50%;background:' + color + ';box-shadow:0 0 8px ' + color + ';animation:livePulse 1.8s infinite;\"></span>'\n          + '<span style=\"font-family:&#39;JetBrains Mono&#39;,monospace;font-size:10.5px;letter-spacing:1px;color:' + color + ';\">' + label + '</span>'\n          + (it.client ? '<span style=\"margin-left:auto;font-family:&#39;JetBrains Mono&#39;,monospace;font-size:10px;color:#7c7c92;\">' + esc(it.client) + '</span>' : '')\n          + '</div>'\n          + '<div style=\"font-size:14.5px;font-weight:600;line-height:1.35;color:#ededf2;\">' + esc(it.name) + '</div>'\n          + (meta ? '<div style=\"font-family:&#39;JetBrains Mono&#39;,monospace;font-size:11px;color:#7c7c92;\">' + esc(meta) + '</div>' : '')\n          + '</div>';\n      };\n      const render = (data) => {\n        const items = (data && data.items) || [];\n        grid.innerHTML = items.length ? items.map(card).join(\"\") : '<p style=\"color:#7c7c92;font-size:14px;\">No live systems to show right now.</p>';\n        if (cntEl && data && data.counts) cntEl.textContent = (data.counts.live || 0) + \" live · \" + (data.counts.testing || 0) + \" testing\";\n        if (updEl && data && data.updated) {\n          const d = new Date(data.updated);\n          updEl.textContent = isNaN(d.getTime()) ? \"\" : \"Updated \" + d.toLocaleString(\"en-GB\", { day: \"numeric\", month: \"short\", year: \"numeric\", hour: \"2-digit\", minute: \"2-digit\" });\n        }\n      };\n      fetch(\"/monday-status.json\", { cache: \"no-store\" })\n        .then((r) => { if (!r.ok) throw new Error(\"http \" + r.status); return r.json(); })\n        .then(render)\n        .catch(() => { grid.innerHTML = '<p style=\"color:#7c7c92;font-size:14px;\">Live status temporarily unavailable.</p>'; });\n    })();\n  }\n\n  componentWillUnmount() {\n    if (this._typeTimer) clearTimeout(this._typeTimer);\n  }\n}\n<\/script>\n\n\n</body></html>"
  </script>
